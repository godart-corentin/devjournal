name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../devjournal-${{ matrix.target }}.tar.gz devjournal
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/devjournal.exe" -DestinationPath "devjournal-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devjournal-${{ matrix.target }}
          path: devjournal-${{ matrix.target }}.*

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build native release binary
        run: cargo build --release --verbose

      - name: Package and smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          host_target=$(rustc -vV | sed -n 's/^host: //p')
          archive="devjournal-${host_target}.tar.gz"
          tar czf "$archive" -C target/release devjournal
          sh tests/smoke_release_unix.sh "$archive"

      - name: Package and smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hostTarget = ((rustc -vV) | Select-String '^host: ').ToString().Split()[1]
          $archive = "devjournal-$hostTarget.zip"
          Compress-Archive -Path "target/release/devjournal.exe" -DestinationPath $archive
          ./tests/smoke_release_windows.ps1 -ArchivePath $archive

  release:
    name: Create Release
    needs: [build, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum devjournal-*.* > devjournal-checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
